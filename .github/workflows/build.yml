name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure CMake
        run: cmake -S . -B build
      
      - name: Build
        run: cmake --build build --config Debug
      
      - name: Run Tests
        run: .\build\Debug\sorting_tests.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev pkg-config
      
      - name: Configure CMake
        run: cmake -S . -B build
      
      - name: Build
        run: cmake --build build
      
      - name: Run Tests
        run: ./build/sorting_tests
